<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Party</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- Modern UI CSS (Same as Index + New Elements) --- */
        :root {
            --bg-color: #0f172a;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #3b0764 0%, transparent 50%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .party-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease-out;
        }

        .title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        /* Modern Input Field Styling */
        .input-field {
            width: 100%;
            padding: 1rem 1.25rem;
            margin-bottom: 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
            letter-spacing: 1px;
        }

        .input-field::placeholder {
            color: #64748b;
        }

        .input-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
            background: rgba(15, 23, 42, 0.8);
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.05rem;
            padding: 1rem;
            border-radius: 12px;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #d946ef);
            color: white;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.6);
        }

        /* Styling for the red buttons */
        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #b91c1c);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(239, 68, 68, 0.5);
        }

        /* Status message styling */
        #status {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #cbd5e1;
            min-height: 20px; /* Prevents layout jump when text appears */
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="party-card">
        <h2 class="title">Join Audio Party</h2>
        <p class="subtitle">Enter the code to sync up.</p>

        <input type="text" id="codeInput" class="input-field" placeholder="Enter Party Code" autocomplete="off">
        
        <div class="btn-container">
            <button class="btn btn-primary" id="joinBtn">🎧 Join</button>
            <button class="btn btn-danger" id="disconnectBtn" style="display:none;">Disconnect</button>
            <button class="btn btn-danger" id="muteMobile" style="display:none;">Mute Mobile</button>
            <button class="btn btn-primary" id="tapToPlay" style="display:none; margin-top:10px;">🔊 Tap to Enable Audio</button>
        </div>

        <p id="status"></p>
        <audio id="audioPlayer" autoplay></audio>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="js/socket.js"></script>
    <script src="js/join.js"></script>

</body>
</html>
